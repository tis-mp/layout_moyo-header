<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>Moyo header</title>
    <link
      rel="stylesheet"
      href="./style.css"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"

    />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  </head>
  <body>

      <nav>
        <ul>
          <img
            class="logo"
            src="/src/images/logo.png"
            alt="Moyo header logo"
          />
          <a
            class="list"
            href="#Apple"
          >
            Apple
          </a>
          <a
            class="list"
            href="#Samsung"
          >
            Samsung
          </a>
          <a
            class="list"
            href="#Smartphones"
          >
            Smartphones
          </a>
          <a
            class="list"
            href="#data-qa=hover"
          >
            Laptops & Computers
          </a>
          <a
            class="list"
            href="#Gadgets"
          >
            Gadgets
          </a>
          <a
            class="list"
            href="#Tablets"
          >
            Tablets
          </a>
          <a
            class="list"
            href="Photo"
          >
            Photo
          </a>
          <a
            class="list"
            href="#Video"

          >
            Video
          </a>
        </ul>
      </nav>
    </header>

</html>
